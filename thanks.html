<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thank you | L'Awaié</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Noto+Serif+JP:wght@200;300;400&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Noto Serif JP', serif;
    background-color: #9A9290;
    background-image:
      radial-gradient(ellipse at 20% 50%, rgba(184,147,138,0.6) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 20%, rgba(140,107,99,0.4) 0%, transparent 50%);
    color: #fff;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px;
    text-align: center;
  }
  .wrap { max-width: 520px; }
  h1 {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-weight: 300;
    font-size: clamp(40px, 7vw, 72px);
    line-height: 1.1;
    margin-bottom: 32px;
  }
  .divider {
    width: 40px;
    height: 1px;
    background: rgba(255,255,255,0.4);
    margin: 32px auto;
  }
  p {
    font-weight: 200;
    font-size: clamp(14px, 2vw, 16px);
    line-height: 2.2;
    color: rgba(255,255,255,0.85);
    margin-bottom: 32px;
  }
  a {
    display: inline-block;
    margin-top: 24px;
    padding: 14px 40px;
    border: 1px solid rgba(255,255,255,0.5);
    color: #fff;
    text-decoration: none;
    font-size: 13px;
    letter-spacing: 0.2em;
    transition: all 0.3s;
  }
  a:hover {
    background: rgba(255,255,255,0.12);
  }
</style>
</head>
<body>
  <div class="wrap">
    <h1>Thank you.</h1>
    <div class="divider"></div>
    <p>
      ご登録ありがとうございます。<br>
      最新情報と特典は、<br>
      ご登録いただいたメールアドレスへお届けします。
    </p>
    <a href="index.html">トップへ戻る</a>
  </div>
</body>
</html>
